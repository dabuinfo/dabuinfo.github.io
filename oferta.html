<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta | Automatyzacja</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YQTCG26T1B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-YQTCG26T1B');
    </script>
    <style>
        body { background-color: #121212; margin: 0; padding: 0; color: #e0e0e0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .news-wrapper { width: 100%; max-width: 1200px; margin: 20px auto; padding: 30px; box-sizing: border-box; border-radius: 12px; border: 1px solid #333; line-height: 1.6; }
        .post-header { color: #f1c40f; font-size: clamp(1.6em, 5vw, 2.4em); font-weight: 800; margin: 0 0 45px 0; padding-bottom: 25px; border-bottom: 2px solid #333; }
        .section-title { color: #3498db; font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .feature-box { background: #1e1e1e; border-left: 4px solid #2ecc71; padding: 20px; margin: 15px 0; border-radius: 4px; }
        .bonus-info { background: rgba(46, 204, 113, 0.1); border: 1px dashed #2ecc71; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .state-title { color: #f1c40f; margin: 25px 0 10px 0; font-size: 1.15rem; font-weight: bold; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        .benefit-list { list-style: none; padding-left: 0; }
        .benefit-list li { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
        .check-icon { color: #2ecc71; font-weight: bold; font-size: 1.1em; }

        /* Optymalizacja mobilna */
        @media (max-width: 600px) {
            .news-wrapper { padding: 15px; margin: 5px; border-radius: 0; border: none; }
            .post-header { font-size: 1.4rem !important; margin-bottom: 20px !important; }
            .region-tag {
                display: block;
                margin: 8px 0;
                padding: 14px 15px;
                border-left: 5px solid #2ecc71;
                background: #1e1e1e;
                color: #e0e0e0;
                text-decoration: none;
                border-radius: 4px;
            }
            .region-tag.building { border-left-color: #f39c12; }
        }

        /* Desktop */
        @media (min-width: 601px) {
            .region-tag { background: #1e1e1e; padding: 5px 12px; border-radius: 30px; display: inline-block; margin: 5px 8px 5px 0; border-left: 3px solid #2ecc71; font-size: 0.9rem; color: #e0e0e0; text-decoration: none; }
            .region-tag.building { border-left-color: #f39c12; }
            .region-tag:hover { background-color: #2ecc71; color: #121212; }
        }
    </style>
</head>
<body>

    <div class="news-wrapper">
        <div id="dynamic-header" class="post-header"></div>
        <div id="blogPostContainer" class="content-section"></div>
    </div>

    <script>
        (function() {
            const regionsByState = {
                "Baden-Württemberg": ["&#128205; Freudenstadt", "&#128205; Karlsruhe", "&#128205; Ortenau (Offenburg)", "&#128205; Tuttlingen"],
                "Bayern": ["&#128205; Bamberg", "&#128205; Monachium-Południowy Wschód", "&#128205; Neustadt an der Waldnaab", "&#128205; Regensburg", "&#128205; Straubing-Bogen"],
                "Brandenburg": ["&#128205; Elbe-Elstern", "&#128205; Oder-Spree"],
                "Hessen": ["&#128205; Bad-Homburg", "&#128205; Giessen", "&#128205; Hersfeld-Rotenburg", "&#128205; Limburg-Weilburg", "&#128205; Rheingau-Taunus"],
                "Niedersachsen": ["&#128205; Diepholz", "&#128205; Emsland", "&#128205; Göttingen", "&#128205; Gifhorn", "&#128205; Harburg", "&#128205; Lüneburg", "&#128205; Stade", "&#128205; Wolfsburg"],
                "Nordrhein-Westfalen": ["&#128205; Bonn", "&#128205; Dortmund", "&#128205; Erftstadt","&#128205; Jülich", "&#128205; Leverkusen", "&#128205; Neuss", "&#128205; Pulheim", "&#128205; Rhein-Sieg", "&#128205; Solingen", "&#128205; Wesseling", "&#128205; Wuppertal"],
                "Rheinland-Pfalz": ["&#128205; Alzey-Worms", "&#128205; Bad-Kreuznach", "&#128205; Mayen-Koblenz", "&#128205; Westerwald"],
                "Sachsen": ["&#128205; Leipzig", "&#128205; Nordsachsen"],
                "Sachsen-Anhalt": ["&#128205; Altmarkkreis Salzwedel", "&#128205; Burgenland"],
                "Schleswig-Holstein": ["&#128205; Rendsburg-Eckenförde"],
                "Na zlecenie": ["&#128205; Powiat Kleve", "&#128205; Powiat Euskirchen", "&#128205; Powiat Neuss", "&#128205; Powiat Wesel", "&#128205; Powiat Düren", "&#128205; Powiat Heinsberg", "&#128205; Powiat Viersen"]
            };

            const translations = {
                pl: {
                    header: "🛡️ Dabu-Info – Legalność i Zaufanie",
                    title: "Jawność danych to nasz priorytet!",
                    intro: "Zależy nam, abyście mieli 100% pewności, skąd pochodzą Wasze terminy.",
                    benefit1: "Zgodność z RODO – Przetwarzamy tylko jawne, publiczne dane.",
                    benefit2: "100% Pewności – Potwierdzamy każdy termin bezpośrednio u wydawcy.",
                    regionsIntro: "Aktualnie w naszym systemie znajdziecie regiony:",
                    thanks: "Dziękujemy za zaufanie."
                }
            };

            const container = document.getElementById("blogPostContainer");
            const headerContainer = document.getElementById("dynamic-header");
            const t = translations.pl;

            headerContainer.innerHTML = t.header;

            let regionsHtml = "";
            for (const [state, regions] of Object.entries(regionsByState)) {
                regionsHtml += `<div class="state-title">${state}</div>`;
                regionsHtml += regions.map(r => `<a href="#" class="region-tag">${r}</a>`).join('');
            }

            container.innerHTML = `
                <div class="section-title">${t.title}</div>
                <p>${t.intro}</p>
                <div class="feature-box">
                    <ul class="benefit-list">
                        <li><span class="check-icon">&#10004;</span><div>${t.benefit1}</div></li>
                        <li><span class="check-icon">&#10004;</span><div>${t.benefit2}</div></li>
                    </ul>
                </div>
                <div style="margin-top: 30px;"><strong>${t.regionsIntro}</strong></div>
                ${regionsHtml}
            `;
        })();

        container.innerHTML = `
                <div class="section-title">${t.title}</div>
                <p>${t.intro}</p>
                <div class="feature-box">
                    <ul class="benefit-list">
                        <li><span class="check-icon">&#10004;</span><div>${t.benefit1}</div></li>
                        <li><span class="check-icon">&#10004;</span><div>${t.benefit2}</div></li>
                    </ul>
                </div>
                
                <div style="margin-top: 30px;"><strong>${t.regionsIntro}</strong></div>
                ${regionsHtml}

                <div style="margin: 50px 0; text-align: center;">
                    <a href="https://dabu-info.com/extra.html" style="
                        display: inline-block;
                        background-color: #2ecc71;
                        color: #ffffff;
                        padding: 20px 40px;
                        text-decoration: none;
                        font-weight: bold;
                        font-size: 1.2rem;
                        border-radius: 8px;
                        border: 2px solid #fff;
                        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    ">
                        📦 Złóż zamówienie (Wybierz rejony)
                    </a>
                </div>
            `;
        })();
    </script>
</body>
</html>
