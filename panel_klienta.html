<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Klienta</title>
    <style>
        /* Stylizacja - Dark Mode */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            margin: 0;
            color: #2ecc71;
            font-size: 24px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #2ecc71;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }
        .hidden {
            display: none;
        }
        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
        .error { color: #ff6b6b; }
        .success { color: #2ecc71; }
        
        /* Stylizacja wyników / terminów */
        .rejon-card {
            background: #2c2c2c;
            border-left: 4px solid #2ecc71;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .rejon-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #fff;}
        .termin-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 5px 0;
            font-size: 14px;
        }
        .termin-item:last-child { border-bottom: none; }
        .type-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        .logout-btn {
            background-color: #e74c3c;
            margin-top: 20px;
        }
        .logout-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="ui-title">Panel Klienta</h1>
    </div>

    <div id="loginSection">
        <div class="form-group">
            <input type="email" id="emailInput" placeholder="E-mail">
        </div>
        <button id="btnRequestPin" onclick="requestPin()">Wyślij PIN</button>

        <div id="pinGroup" class="form-group hidden" style="margin-top: 20px;">
            <input type="text" id="pinInput" placeholder="Kod PIN" autocomplete="off" maxlength="6">
            <button id="btnVerifyPin" onclick="verifyPin()" style="margin-top: 10px;">Zaloguj się</button>
        </div>
    </div>

    <div id="dataSection" class="hidden">
        <h2 id="ui-welcome" style="font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px;">Twoje Rejony</h2>
        <div id="rejonList"></div>
        <button class="logout-btn" id="btnLogout" onclick="logout()">Wyloguj</button>
    </div>

    <div id="statusMessage"></div>
</div>

<script>
    // Konfiguracja backendu
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwdt7Ro7dKaB9ZIFFbi6KjEi7dd3vNG5bXAp0MZcAka0JH-SI6wx2w-pGSrlmteixL12A/exec"; // <--- Wklej tutaj URL z Google Apps Script

    // Wykrywanie języka
    let userLang = navigator.language || navigator.userLanguage;
    userLang = userLang.substr(0, 2).toLowerCase();
    const supported = ['pl', 'de', 'cs', 'sk', 'hu', 'ro', 'bg', 'tr', 'bs', 'uk', 'ru', 'lt', 'en'];
    if (!supported.includes(userLang)) userLang = 'de'; // Fallback na niemiecki

    // Słownik tłumaczeń
    const dict = {
        'pl': { title: "Panel Klienta", email: "Twój e-mail", reqPin: "Wyślij PIN", pin: "Kod PIN", login: "Zaloguj", logout: "Wyloguj", loading: "Przetwarzanie...", sent: "PIN wysłany na e-mail!", errorReq: "Błąd połączenia.", welcome: "Twoje harmonogramy:" },
        'de': { title: "Kundenpanel", email: "Deine E-Mail", reqPin: "PIN anfordern", pin: "PIN-Code", login: "Anmelden", logout: "Abmelden", loading: "Wird bearbeitet...", sent: "PIN an E-Mail gesendet!", errorReq: "Verbindungsfehler.", welcome: "Deine Zeitpläne:" },
        'en': { title: "Client Panel", email: "Your E-mail", reqPin: "Request PIN", pin: "PIN Code", login: "Login", logout: "Logout", loading: "Processing...", sent: "PIN sent to email!", errorReq: "Connection error.", welcome: "Your schedules:" },
        // Fallback dla pozostałych języków ustawiłem na angielski, ale możesz rozbudować poniższe obiekty.
        'cs': { title: "Zákaznický panel", email: "Váš e-mail", reqPin: "Vyžádat PIN", pin: "PIN kód", login: "Přihlásit", logout: "Odhlásit", loading: "Zpracování...", sent: "PIN odeslán!", errorReq: "Chyba.", welcome: "Vaše plány:" },
        'sk': { title: "Zákaznícky panel", email: "Váš e-mail", reqPin: "Vyžiadať PIN", pin: "PIN kód", login: "Prihlásiť", logout: "Odhlásiť", loading: "Spracovanie...", sent: "PIN odoslaný!", errorReq: "Chyba.", welcome: "Vaše plány:" },
        'hu': { title: "Ügyfélkapu", email: "Az Ön e-mailje", reqPin: "PIN kérése", pin: "PIN kód", login: "Bejelentkezés", logout: "Kijelentkezés", loading: "Feldolgozás...", sent: "PIN elküldve!", errorReq: "Hiba.", welcome: "Az Ön ütemtervei:" },
        'ro': { title: "Panoul Clientului", email: "E-mailul tău", reqPin: "Solicită PIN", pin: "Cod PIN", login: "Autentificare", logout: "Deconectare", loading: "Se procesează...", sent: "PIN trimis!", errorReq: "Eroare.", welcome: "Programele tale:" },
        'bg': { title: "Клиентски панел", email: "Вашият имейл", reqPin: "Заяви PIN", pin: "PIN код", login: "Вход", logout: "Изход", loading: "Обработка...", sent: "PIN изпратен!", errorReq: "Грешка.", welcome: "Вашите графици:" },
        'tr': { title: "Müşteri Paneli", email: "E-postanız", reqPin: "PIN İste", pin: "PIN Kodu", login: "Giriş Yap", logout: "Çıkış Yap", loading: "İşleniyor...", sent: "PIN gönderildi!", errorReq: "Hata.", welcome: "Programlarınız:" },
        'bs': { title: "Korisnički panel", email: "Vaš e-mail", reqPin: "Zatraži PIN", pin: "PIN kod", login: "Prijava", logout: "Odjava", loading: "Obrada...", sent: "PIN poslan!", errorReq: "Greška.", welcome: "Vaši rasporedi:" },
        'uk': { title: "Панель клієнта", email: "Ваш e-mail", reqPin: "Запитати PIN", pin: "PIN код", login: "Увійти", logout: "Вийти", loading: "Обробка...", sent: "PIN відправлено!", errorReq: "Помилка.", welcome: "Ваші графіки:" },
        'ru': { title: "Панель клиента", email: "Ваш e-mail", reqPin: "Запросить PIN", pin: "PIN код", login: "Войти", logout: "Выйти", loading: "Обработка...", sent: "PIN отправлен!", errorReq: "Ошибка.", welcome: "Ваши графики:" },
        'lt': { title: "Klientų skydelis", email: "Jūsų el. paštas", reqPin: "Prašyti PIN", pin: "PIN kodas", login: "Prisijungti", logout: "Atsijungti", loading: "Apdorojama...", sent: "PIN išsiųstas!", errorReq: "Klaida.", welcome: "Jūsų tvarkaraščiai:" }
    };

    const t = dict[userLang] || dict['de'];

    // Aplikacja tłumaczeń do DOM
    document.getElementById('ui-title').innerText = t.title;
    document.getElementById('emailInput').placeholder = t.email;
    document.getElementById('btnRequestPin').innerText = t.reqPin;
    document.getElementById('pinInput').placeholder = t.pin;
    document.getElementById('btnVerifyPin').innerText = t.login;
    document.getElementById('btnLogout').innerText = t.logout;
    document.getElementById('ui-welcome').innerText = t.welcome;

    // Generowanie lub pobieranie Device ID
    function getDeviceId() {
        let did = localStorage.getItem('dabu_device_id');
        if (!did) {
            did = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('dabu_device_id', did);
        }
        return did;
    }

    const deviceId = getDeviceId();
    const userAgent = navigator.userAgent;
    let currentEmail = "";

    function showMsg(msg, isError = false) {
        const el = document.getElementById('statusMessage');
        el.innerText = msg;
        el.className = isError ? "error" : "success";
    }

    // Prośba o PIN
    async function requestPin() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email) return showMsg(t.errorReq, true);
        
        currentEmail = email;
        const btn = document.getElementById('btnRequestPin');
        btn.disabled = true;
        btn.innerText = t.loading;
        showMsg("");

        try {
            const formData = new URLSearchParams();
            formData.append("action", "request_pin");
            formData.append("email", email);
            formData.append("deviceId", deviceId);
            formData.append("userAgent", userAgent);

            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showMsg(t.sent);
                document.getElementById('btnRequestPin').classList.add('hidden');
                document.getElementById('emailInput').disabled = true;
                document.getElementById('pinGroup').classList.remove('hidden');
            } else {
                showMsg(result.error, true);
                btn.disabled = false;
                btn.innerText = t.reqPin;
            }
        } catch (e) {
            showMsg(t.errorReq, true);
            btn.disabled = false;
            btn.innerText = t.reqPin;
        }
    }

    // Weryfikacja logowania
    async function verifyPin() {
        const pin = document.getElementById('pinInput').value.trim();
        if (!pin) return;

        const btn = document.getElementById('btnVerifyPin');
        btn.disabled = true;
        btn.innerText = t.loading;
        showMsg("");

        try {
            const formData = new URLSearchParams();
            formData.append("action", "verify_pin");
            formData.append("email", currentEmail);
            formData.append("pin", pin);
            formData.append("deviceId", deviceId);
            formData.append("userAgent", userAgent);

            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showMsg("");
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dataSection').classList.remove('hidden');
                renderData(result.multiData);
            } else {
                showMsg(result.error, true);
                btn.disabled = false;
                btn.innerText = t.login;
            }
        } catch (e) {
            showMsg(t.errorReq, true);
            btn.disabled = false;
            btn.innerText = t.login;
        }
    }

    // Renderowanie pobranych harmonogramów (multiData zwracane przez Backend)
    function renderData(multiData) {
        const container = document.getElementById('rejonList');
        container.innerHTML = "";
        
        if (Object.keys(multiData).length === 0) {
            container.innerHTML = "<p>Brak zaplanowanych wyjazdów / Keine geplanten Termine.</p>";
            return;
        }

        for (const [rejonKey, data] of Object.entries(multiData)) {
            let html = `<div class="rejon-card">
                            <div class="rejon-title">${data.realName}</div>`;
            
            if (data.info) {
                html += `<div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">ℹ️ ${data.info}</div>`;
            }

            data.items.forEach(item => {
                const bgTypeColor = item.color || "#002fff"; // Zabezpieczenie na wypadek braku koloru
                html += `
                    <div class="termin-item">
                        <span><strong>${item.date}</strong> - ${item.city}</span>
                        <span class="type-badge" style="background-color: ${bgTypeColor}">${item.type}</span>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    // Wylogowanie
    async function logout() {
        const btn = document.getElementById('btnLogout');
        btn.disabled = true;
        btn.innerText = t.loading;

        try {
            const formData = new URLSearchParams();
            formData.append("action", "logout");
            formData.append("email", currentEmail);
            formData.append("deviceId", deviceId);
            formData.append("userAgent", userAgent);

            await fetch(WEB_APP_URL, { method: 'POST', body: formData });
        } catch (e) {}

        // Reset frontendu niezależnie od wyniku połączenia z backendem
        location.reload();
    }
</script>
</body>
</html>
