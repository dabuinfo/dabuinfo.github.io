<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie - Terminy wystawek</title>
    <style>
        body { background-color: #121212; margin: 0; padding: 0; color: #e0e0e0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .order-module { background-color: #121212; color: #e0e0e0; padding: 25px; border-radius: 12px; border: 1px solid #333; max-width: 1000px; margin: 40px auto; box-sizing: border-box; }
        .order-module h2 { color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 15px; font-size: 1.8rem; }
        .order-regions-container { max-height: 500px; overflow-y: auto; padding: 15px; border: 1px solid #222; border-radius: 8px; background: #171717; }
        .powiat-header { color: #3498db; border-bottom: 1px dashed #444; padding-bottom: 5px; margin: 25px 0 12px 0; font-size: 1.15rem; }
        .regions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; }
        .region-checkbox-label { display: flex; align-items: center; background: #252525; padding: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #333; font-size: 0.95rem; }
        .region-checkbox-label input { margin-right: 12px; width: 20px; height: 20px; accent-color: #f39c12; cursor: pointer; }
        .cart-summary { background: rgba(46, 204, 113, 0.1); border: 1px dashed #2ecc71; padding: 20px; border-radius: 8px; margin-top: 30px; }
        .btn-order { display: block; width: 100%; background-color: #2ecc71; color: #ffffff; border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-order:disabled { background-color: #555; cursor: not-allowed; }

        @media (max-width: 600px) {
            .order-module { padding: 15px; margin: 0; border-radius: 0; border: none; }
            .regions-grid { grid-template-columns: 1fr; }
            .region-checkbox-label { padding: 16px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="order-module">
    <h2>📦 Zleć przygotowanie harmonogramów</h2>
    <div id="regionsContainer" class="order-regions-container"></div>
    <div class="cart-summary">
        <h3>🛒 Twój koszyk</h3>
        <ul id="selectedRegionsList"><li>Brak wybranych gmin.</li></ul>
        <div class="total-price-box">Razem do zapłaty: <span id="totalPrice">0</span> zł</div>
        <button id="submitOrderBtn" class="btn-order" disabled>📱 Złóż zamówienie</button>
    </div>
</div>

<script>
    (function() {
        const pricePerRegion = 60; // Cena wróciła na 60 zł
        const targetPhoneNumber = "+48600812820";
        const regionsToOrder = {
    "📍 Powiat Kleve (Kreis Kleve)": [
        "Bedburg-Hau (E); (S)", "Emmerich am Rhein (E); (S)", "Geldern (E); (S)", 
        "Issum (E); (S)", "Kerken (E); (S)", "Kevelaer (E); (S)", 
        "Rees (E); (S)", "Rheurdt (E); (S)", "Straelen (E); (S)", 
        "Uedem (E); (S)", "Weeze (E); (S)"
    ],
    "📍 Powiat Euskirchen (Kreis Euskirchen)": [
        "Bad Münstereifel (E); (S)", "Blankenheim (E); (S)", "Dahlem (E); (S)", 
        "Hellenthal (E); (S)", "Kall (E); (S)", "Mechernich (E); (S)", 
        "Schleiden (E); (S)", "Weilerswist (E); (S)", "Zülpich (E); (S)"
    ],
    "📍 Powiat Neuss (Rhein-Kreis Neuss)": [
        "Dormagen (E); (S)", "Grevenbroich (E); (S)", "Jüchen (E); (S)", "Kaarst (E); (S)", 
        "Korschenbroich (E); (S)", "Meerbusch (E); (S)", "Neuss (E); (S)", "Rommerskirchen (E); (S)"
    ],
    "📍 Powiat Wesel (Kreis Wesel)": [
        "Alpen (E); (S)", "Neukirchen-Vluyn (E); (S)", "Sonsbeck (E); (S)", 
        "Voerde (E); (S)", "Xanten (E)"
    ],
    "📍 Powiat Düren (Kreis Düren)": [
        "Aldenhoven (E); (S)", "Jülich (E)", "Merzenich (E); (S)"
    ],
    "📍 Powiat Heinsberg (Kreis Heinsberg)": [
        "Hückelhoven (E); (S)", "Selfkant (S)", "Übach-Palenberg (E); (S)"
    ],
    "📍 Powiat Viersen (Kreis Viersen)": [
        "Grefrath (E); (S)", "Nettetal (E); (S)", "Tönisvorst (E); (S)", "Viersen (E); (S)"
    ],
    "📍 Powiat Märkischer (Märkischer Kreis)": [
        "Altena (E); (S)", "Balve (E); (S)", "Iserlohn (E); (S)", "Menden (E); (S)", 
        "Nachrodt-Wiblingwerde (E); (S)", "Plettenberg (E); (S)", "Werdohl (E); (S)"
    ]
};


        const container = document.getElementById('regionsContainer');
        const selectedList = document.getElementById('selectedRegionsList');
        const priceDisplay = document.getElementById('totalPrice');
        const orderBtn = document.getElementById('submitOrderBtn');
        let selectedItems = [];

        Object.entries(regionsToOrder).forEach(([powiat, regions]) => {
            const h = document.createElement('h4'); h.className = 'powiat-header'; h.textContent = powiat; container.appendChild(h);
            const grid = document.createElement('div'); grid.className = 'regions-grid';
            regions.forEach(r => {
                const label = document.createElement('label'); label.className = 'region-checkbox-label';
                const input = document.createElement('input'); input.type = 'checkbox'; input.value = r;
                input.addEventListener('change', (e) => {
                    selectedItems = e.target.checked ? [...selectedItems, r] : selectedItems.filter(i => i !== r);
                    updateUI();
                });
                label.appendChild(input); label.appendChild(document.createTextNode(r)); grid.appendChild(label);
            });
            container.appendChild(grid);
        });

        function updateUI() {
            selectedList.innerHTML = selectedItems.length === 0 ? '<li>Brak wybranych gmin.</li>' : selectedItems.map(i => `<li>✅ ${i}</li>`).join('');
            orderBtn.disabled = selectedItems.length === 0;
            priceDisplay.textContent = selectedItems.length * pricePerRegion;
        }

        orderBtn.addEventListener('click', () => {
            const msg = `Zamówienie: ${selectedItems.join(', ')}. Razem: ${selectedItems.length * pricePerRegion} zł.`;
            window.location.href = `sms:${targetPhoneNumber}?body=${encodeURIComponent(msg)}`;
        });
    })();
</script>
</body>
</html>
