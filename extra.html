<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie - Terminy wystawek</title>
    <style>
        body { background-color: #121212; margin: 0; padding: 0; color: #e0e0e0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        .order-module { padding: 20px; max-width: 1000px; margin: 0 auto; padding-bottom: 200px; }
        .order-module h2 { color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 15px; }
        
        .order-regions-container { padding: 10px; }
        .powiat-header { color: #3498db; border-bottom: 1px dashed #444; padding-bottom: 5px; margin: 20px 0 10px 0; font-size: 1.1rem; }
        .regions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; }
        
        .region-checkbox-label { display: flex; align-items: center; background: #252525; padding: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #333; font-size: 0.95rem; }
        .region-checkbox-label input { margin-right: 12px; width: 20px; height: 20px; accent-color: #f39c12; cursor: pointer; }

        /* KOSZYK PRZYKLEJONY DO DOŁU */
        .cart-summary {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            border-top: 2px solid #2ecc71;
            padding: 15px;
            box-sizing: border-box;
            z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .cart-content { max-width: 1000px; margin: 0 auto; }
        .btn-order { display: block; width: 100%; background-color: #2ecc71; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-order:disabled { background-color: #555; }

        @media (max-width: 600px) {
            .order-module { padding: 10px; padding-bottom: 180px; }
            .regions-grid { grid-template-columns: 1fr; }
            .cart-summary { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="order-module">
    <h2>📦 Zleć przygotowanie harmonogramów</h2>
    <div id="regionsContainer" class="order-regions-container"></div>
</div>

<div class="cart-summary">
    <div class="cart-content">
        <div style="font-size: 1.1rem; margin-bottom: 10px;">Razem do zapłaty: <span id="totalPrice">0</span> zł</div>
        <button id="submitOrderBtn" class="btn-order" disabled>📱 Złóż zamówienie</button>
    </div>
</div>

<script>
    (function() {
        const pricePerRegion = 60;
        const targetPhoneNumber = "+48600812820";
        const regionsToOrder = {
            "📍 Powiat Kleve": ["Bedburg-Hau (E); (S)", "Emmerich am Rhein (E); (S)", "Geldern (E); (S)", "Issum (E); (S)", "Kerken (E); (S)", "Kevelaer (E); (S)", "Rees (E); (S)", "Rheurdt (E); (S)", "Straelen (E); (S)", "Uedem (E); (S)", "Weeze (E); (S)"],
            "📍 Powiat Euskirchen": ["Bad Münstereifel (E); (S)", "Blankenheim (E); (S)", "Dahlem (E); (S)", "Hellenthal (E); (S)", "Kall (E); (S)", "Mechernich (E); (S)", "Schleiden (E); (S)", "Weilerswist (E); (S)", "Zülpich (E); (S)"],
            "📍 Powiat Neuss": ["Dormagen (E); (S)", "Grevenbroich (E); (S)", "Jüchen (E); (S)", "Kaarst (E); (S)", "Korschenbroich (E); (S)", "Meerbusch (E); (S)", "Neuss (E); (S)", "Rommerskirchen (E); (S)"],
            "📍 Powiat Wesel": ["Alpen (E); (S)", "Neukirchen-Vluyn (E); (S)", "Sonsbeck (E); (S)", "Voerde (E); (S)", "Xanten (E)"],
            "📍 Powiat Düren": ["Aldenhoven (E); (S)", "Jülich (E)", "Merzenich (E); (S)"],
            "📍 Powiat Heinsberg": ["Hückelhoven (E); (S)", "Selfkant (S)", "Übach-Palenberg (E); (S)"],
            "📍 Powiat Viersen": ["Grefrath (E); (S)", "Nettetal (E); (S)", "Tönisvorst (E); (S)", "Viersen (E); (S)"],
            "📍 Powiat Märkischer": ["Altena (E); (S)", "Balve (E); (S)", "Iserlohn (E); (S)", "Menden (E); (S)", "Nachrodt-Wiblingwerde (E); (S)", "Plettenberg (E); (S)", "Werdohl (E); (S)"]
        };

        const container = document.getElementById('regionsContainer');
        const priceDisplay = document.getElementById('totalPrice');
        const orderBtn = document.getElementById('submitOrderBtn');
        let selectedItems = [];

        Object.entries(regionsToOrder).forEach(([powiat, regions]) => {
            const h = document.createElement('h4'); h.className = 'powiat-header'; h.textContent = powiat; container.appendChild(h);
            const grid = document.createElement('div'); grid.className = 'regions-grid';
            regions.forEach(r => {
                const label = document.createElement('label'); label.className = 'region-checkbox-label';
                const input = document.createElement('input'); input.type = 'checkbox'; input.value = r;
                input.addEventListener('change', (e) => {
                    selectedItems = e.target.checked ? [...selectedItems, r] : selectedItems.filter(i => i !== r);
                    updateUI();
                });
                label.appendChild(input); label.appendChild(document.createTextNode(r)); grid.appendChild(label);
            });
            container.appendChild(grid);
        });

        function updateUI() {
            orderBtn.disabled = selectedItems.length === 0;
            priceDisplay.textContent = selectedItems.length * pricePerRegion;
        }

        orderBtn.addEventListener('click', () => {
            const dateStr = "20260626";
            const randomSuffix = Math.floor(1000 + Math.random() * 9000);
            const orderId = `${dateStr}-${randomSuffix}`;
            const msg = `Dzień dobry, zamówienie ${orderId}: ${selectedItems.join(', ')}. Razem: ${selectedItems.length * pricePerRegion} zł.`;
            window.location.href = `sms:${targetPhoneNumber}?body=${encodeURIComponent(msg)}`;
        });
    })();
</script>
</body>
</html>
