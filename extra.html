<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie - Terminy wystawek</title>
    <style>
        body { background-color: #121212; margin: 0; padding: 0; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .order-module { padding: 20px; max-width: 1000px; margin: 0 auto; padding-bottom: 220px; }
        .service-info { background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #f1c40f; font-size: 0.9rem; }
        .powiat-header { color: #3498db; border-bottom: 1px dashed #444; padding-bottom: 5px; margin: 20px 0 10px; font-size: 1.1rem; }
        .regions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .region-checkbox-label { display: flex; align-items: center; background: #252525; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid #333; font-size: 0.9rem; }
        .region-checkbox-label input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        
        .cart-summary { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #2ecc71; padding: 15px; box-sizing: border-box; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .btn-order { display: block; width: 100%; background-color: #2ecc71; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-order:disabled { background-color: #555; }
    </style>
</head>
<body>

<div class="order-module">
    <h2>📦 Zamówienie harmonogramów</h2>
    <div class="service-info">
        <b>Dwa rodzaje usług:</b><br>
        1. <b>Gminy (Extra):</b> 40 zł / najbl. termin (dane z bota: podział na wioski/ulice).<br>
        2. <b>Landy:</b> 100 zł / najbl. tydzień (dane z bota: pełna automatyzacja).
    </div>
    <div id="regionsContainer"></div>
</div>

<div class="cart-summary">
    <div style="max-width: 1000px; margin: 0 auto;">
        <div style="margin-bottom: 10px;">Razem do zapłaty: <span id="totalPrice">0</span> zł</div>
        <button id="submitOrderBtn" class="btn-order" disabled>📱 Złóż zamówienie</button>
    </div>
</div>

<script>
    (function() {
        const targetPhoneNumber = "+48600812820";
        
        // Struktura z cenami: { "Nazwa": { list: [...], price: X } }
        const data = {
            "📍 Gminy (Extra) - 40 PLN": {
                price: 40,
                list: ["Powiat Kleve", "Powiat Euskirchen", "Powiat Neuss", "Powiat Wesel", "Powiat Düren", "Powiat Heinsberg", "Powiat Viersen", "Powiat Märkischer"]
            },
            "📍 Landy - 100 PLN": {
                price: 100,
                list: ["Baden-Württemberg", "Bayern", "Brandenburg", "Hessen", "Niedersachsen", "Nordrhein-Westfalen", "Rheinland-Pfalz", "Sachsen", "Sachsen-Anhalt", "Schleswig-Holstein"]
            }
        };

        const container = document.getElementById('regionsContainer');
        const priceDisplay = document.getElementById('totalPrice');
        const orderBtn = document.getElementById('submitOrderBtn');
        let selectedItems = []; // Przechowuje obiekty {name, price}

        Object.entries(data).forEach(([group, config]) => {
            const h = document.createElement('h4'); h.className = 'powiat-header'; h.textContent = group; container.appendChild(h);
            const grid = document.createElement('div'); grid.className = 'regions-grid';
            config.list.forEach(item => {
                const label = document.createElement('label'); label.className = 'region-checkbox-label';
                const input = document.createElement('input'); input.type = 'checkbox';
                input.addEventListener('change', (e) => {
                    if (e.target.checked) selectedItems.push({name: item, price: config.price});
                    else selectedItems = selectedItems.filter(i => i.name !== item);
                    updateUI();
                });
                label.appendChild(input); label.appendChild(document.createTextNode(item)); grid.appendChild(label);
            });
            container.appendChild(grid);
        });

        function updateUI() {
            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            priceDisplay.textContent = total;
            orderBtn.disabled = selectedItems.length === 0;
        }

        orderBtn.addEventListener('click', () => {
            const total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            const orderId = `20260626-${Math.floor(1000 + Math.random() * 9000)}`;
            const msg = `Zamówienie ${orderId}: ${selectedItems.map(i => i.name).join(', ')}. Razem: ${total} zł.`;
            window.location.href = `sms:${targetPhoneNumber}?body=${encodeURIComponent(msg)}`;
        });
    })();
</script>
</body>
</html>
