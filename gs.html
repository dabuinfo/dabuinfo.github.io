<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie Bazy Danych</title>
    <style>
        :root { --bg-color: #f4f4f9; --box-bg: #ffffff; --text-color: #333; --accent-color: #000; }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #121212; --box-bg: #1e1e1e; --text-color: #e0e0e0; --accent-color: #ffffff; }
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 500px; background-color: var(--box-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { margin-top: 0; color: var(--accent-color); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 14px; border: 1px solid #555; border-radius: 8px; background-color: var(--box-bg); color: var(--text-color); box-sizing: border-box; font-size: 16px; }
        button { background: var(--accent-color); color: var(--bg-color); padding: 16px; border: none; cursor: pointer; width: 100%; font-size: 16px; border-radius: 8px; font-weight: bold; }
        #wynik { margin-top: 25px; padding: 20px; background: #2e7d32; color: white; border-radius: 8px; display: none; }
        footer { margin-top: 30px; font-size: 0.75em; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Zamówienie bazy danych</h2>
        
        <div class="form-group">
            <label>Branża:</label>
            <input type="text" id="branza" list="branze-list" placeholder="np. Fahrradreparaturen" required>
            <datalist id="branze-list">
                <option value="Fahrradreparaturen">Naprawa rowerów</option>
                <option value="Gebrauchte Fahrräder">Rowery używane</option>
                <option value="Gartengeräte">Sprzęt ogrodniczy</option>
                <option value="Landmaschinen">Maszyny rolnicze</option>
                <option value="Reifendienste">Opony</option>
                <option value="Hochdruckreiniger">Myjki ciśnieniowe</option>
                <option value="Quad">Quady</option>
                <option value="Motorräder">Motory</option>
                <option value="Autoteile">Części samochodowe</option>
                <option value="Autoverwertung">Utylizacja aut</option>
                <option value="Autolackiererei">Lakiernie</option>
                </datalist>
        </div>
        
        <div class="form-group">
            <label>Miejscowość:</label>
            <input type="text" id="miasto" placeholder="np. Bonn" required>
        </div>

        <div class="form-group">
            <label>Dystans (km):</label>
            <input type="number" id="dystans" value="50" min="1" max="50">
        </div>

        <button onclick="generujZamowienie()">Generuj zamówienie (50 PLN)</button>

        <div id="wynik">
            <p><strong>Zamówienie gotowe!</strong></p>
            <p>Numer: <b id="nrZamowienia"></b></p>
            <p>Wyślij SMS na: <b>+48 600 812 820</b></p>
        </div>
    </div>

    <footer>
        <p><b>RODO:</b> Administratorem danych jest Darek [Twoje Nazwisko]. Dane pozyskane z publicznych rejestrów (Gelbe Seiten).</p>
    </footer>

    <script>
        function generujZamowienie() {
            const miasto = document.getElementById('miasto').value;
            const branza = document.getElementById('branza').value;
            if(!miasto || !branza) { alert('Wypełnij wszystkie pola!'); return; }
            
            const now = new Date();
            const nr = `${now.getFullYear().toString().slice(-2)}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}-${Math.floor(1000 + Math.random()*9000)}`;
            
            document.getElementById('nrZamowienia').innerText = nr;
            document.getElementById('wynik').style.display = 'block';
        }
    </script>
</body>
</html>
